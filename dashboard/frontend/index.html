<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaptchaCapture — Dashboard</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/viz.css">
</head>
<body>
<nav class="cc-nav">
  <span class="cc-nav-logo">
    Captcha<span class="accent">Capture</span><span class="cc-nav-section">/ Dashboard</span>
  </span>
  <div class="cc-nav-actions">
    <a href="#" class="cc-nav-link" id="reset-btn">↺ Reset All</a>
    <a href="/" class="cc-nav-link">← Play game</a>
  </div>
</nav>
<div id="dashboard">
  <div id="scatter-wrapper" class="panel">
    <h3>PCA Scatter Plot (PC1 vs PC2)</h3>
    <div id="scatter-plot"></div>
  </div>

  <div id="radar-wrapper" class="panel">
    <h3>Behavior Profile Radar</h3>
    <div id="radar"></div>
  </div>

  <div id="filter-wrapper" class="panel">
    <h3>Game Type</h3>
    <div id="filter-container"></div>
  </div>

  <div id="trajectory-wrapper" class="panel">
    <h3>Mouse Trajectory</h3>
    <div id="trajectory-plot">
      <div id="traj-left"></div>
      <div id="traj-right"></div>
    </div>
    <div id="trajectory-caption"></div>
  </div>

  <!--<div id="selected-point-info-wrapper" class="panel">
    <div id="selected-point-info"></div>
  </div> -->
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/svg_icons.js"></script>
<script src="js/radar.js"></script>
<script src="js/trajectory.js"></script>
<script src="js/filters.js"></script>
<script src="js/scatter.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
